<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawMigrate - 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --blue: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-dark: #020617;
            --bg-card: rgba(30, 41, 59, 0.6);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #020617 0%, #020617 100%);
            color: var(--text-light);
            min-height: 100vh;
        }

        /* 加载动画 */
        .loading-spinner {
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 布局样式 */
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary-light);
        }
        .nav-item.active {
            border-left: 3px solid var(--primary);
        }
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(71, 85, 105, 0.6);
            color: var(--text-light);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* 卡片样式 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }
        .stat-change {
            font-size: 12px;
            color: var(--success);
            margin-top: 4px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-body {
            padding: 24px;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 14px;
        }

        /* 徽章样式 */
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }
        .badge-admin {
            background: rgba(139, 92, 246, 0.2);
            color: var(--primary-light);
        }
        .badge-user {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }
        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }
        .badge-info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        /* 登录页面 */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-light);
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* 隐藏 */
        .hidden {
            display: none !important;
        }

        /* 操作按钮组 */
        .actions {
            display: flex;
            gap: 8px;
        }

        /* 图表占位符 */
        .chart-container {
            height: 300px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        /* 用户头像样式 */
        .avatar-badge {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h2 class="login-title">ClawMigrate</h2>
            <p class="login-subtitle">管理后台登录</p>
            <div id="loginError" class="error-message hidden"></div>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary btn-full" onclick="handleLogin()">登录</button>
        </div>
    </div>

    <div id="adminPage" class="app-container hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">ClawMigrate</div>
            </div>
            <div class="nav-item active" onclick="showSection('dashboard')">
                <span>📊</span>
                <span>数据仪表盘</span>
            </div>
            <div class="nav-item" onclick="showSection('users')">
                <span>👥</span>
                <span>用户管理</span>
            </div>
            <div class="nav-item" onclick="showSection('migrations')">
                <span>📁</span>
                <span>迁移记录</span>
            </div>
            <div class="nav-item" onclick="showSection('activities')">
                <span>📝</span>
                <span>用户行为</span>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">数据仪表盘</h1>
                <div class="user-info">
                    <span id="currentUser" style="color: var(--text-muted); font-size: 14px;"></span>
                    <div class="user-avatar" id="userAvatar">A</div>
                    <button class="btn btn-secondary" onclick="handleLogout()">退出</button>
                </div>
            </div>

            <div id="dashboardSection">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotalUsers">0</div>
                        <div class="stat-label">总注册用户</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTotalMigrations">0</div>
                        <div class="stat-label">总迁移次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTodayPV">0</div>
                        <div class="stat-label">今日 PV</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTodayUV">0</div>
                        <div class="stat-label">今日 UV</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>使用趋势（最近7天）</span>
                    </div>
                    <div class="card-body">
                        <div id="trendLoading" class="loading-spinner"></div>
                        <div id="trendContent"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>平台使用分布</span>
                    </div>
                    <div class="card-body">
                        <div id="platformsLoading" class="loading-spinner"></div>
                        <div id="platformsContent"></div>
                    </div>
                </div>
            </div>

            <div id="usersSection" class="hidden">
                <div class="card">
                    <div class="card-header">
                        <span>用户列表</span>
                        <button class="btn btn-primary" onclick="showAddUserModal()">+ 添加用户</button>
                    </div>
                    <div class="card-body">
                        <div id="usersLoading" class="loading-spinner"></div>
                        <div id="usersTableContainer"></div>
                    </div>
                </div>
            </div>

            <div id="migrationsSection" class="hidden">
                <div class="card">
                    <div class="card-header">
                        <span>迁移记录</span>
                    </div>
                    <div class="card-body">
                        <div id="migrationsLoading" class="loading-spinner"></div>
                        <div id="migrationsTableContainer"></div>
                    </div>
                </div>
            </div>

            <div id="activitiesSection" class="hidden">
                <div class="card">
                    <div class="card-header">
                        <span>用户行为日志</span>
                    </div>
                    <div class="card-body">
                        <div id="activitiesLoading" class="loading-spinner"></div>
                        <div id="activitiesTableContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
